[coverage:run]

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main

[tox:tox]
isolated_build = true
envlist = py312, format, lint
requires =
    tox-uv

[gh-actions]
python =
    3.12: py312, format, lint

[testenv]
runner = uv-venv-lock-runner
dependency_groups = dev
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
    TESTING=1
commands =
    pytest --version
    pytest --cov=nshm_hazard_graphql_api --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:audit]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    uv export --format requirements-txt --no-emit-project --output-file audit.txt
    pip-audit -r audit.txt --require-hashes
    safety scan

[testenv:format]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff format nshm_hazard_graphql_api tests

[testenv:lint]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check nshm_hazard_graphql_api tests
    mypy nshm_hazard_graphql_api tests

[tool:pytest]
testpaths =
    tests
markers =
    slow: slow tests
