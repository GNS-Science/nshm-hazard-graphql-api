name: deploy-aws-lambda

on:
  push:
    branches:
      - deploy-test
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    
jobs:
  verify-aws-account:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify target AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS Account ID: $ACCOUNT_ID"
          EXPECTED_ACCOUNT="461564345538"
          if [ "$ACCOUNT_ID" != "$EXPECTED_ACCOUNT" ]; then
            echo "::error::Deploying to wrong AWS account: $ACCOUNT_ID (expected $EXPECTED_ACCOUNT)"
            exit 1
          fi
          echo "✓ Verified correct AWS account"
  
  call-test-workflow:
    uses: ./.github/workflows/dev.yml
    secrets: inherit

  call-deploy-workflow:
    needs: 
      - verify-aws-account
      - call-test-workflow
    uses: GNS-Science/nshm-github-actions/.github/workflows/deploy-to-aws-uv.yml@main
    with:
      python-version: '3.12'
      node-version: '22'
      docker: true
      node-pkg-manager: 'yarn2' 
    secrets: inherit
