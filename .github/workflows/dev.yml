name: Dev workflow

on:
  # schedule:
  #  - cron:  '40 7 * * 0' # At 07:40 on Sunday
  pull_request:
    branches: [main, deploy-test]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  workflow_call:

jobs:
  verify-aws-account:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify target AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS Account ID: $ACCOUNT_ID"
          EXPECTED_ACCOUNT="461564345538"
          if [ "$ACCOUNT_ID" != "$EXPECTED_ACCOUNT" ]; then
            echo "::error::Deploying to wrong AWS account: $ACCOUNT_ID (expected $EXPECTED_ACCOUNT)"
            exit 1
          fi
          echo "✓ Verified correct AWS account"

  call-test-workflow:
    needs: verify-aws-account
    uses: GNS-Science/nshm-github-actions/.github/workflows/python-run-tests.yml@main
    with:
      operating-systems: "['ubuntu-latest']"
      python-versions: "['3.12']"
      delete-poetry-lock: ${{ github.event_name == 'schedule' }} # the scheduled build tests against newer dependencies
      optional-dependency-groups: dev
    secrets: inherit
